<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="stories.css">
    <title>Historia 6 - Transporte Público</title>
    <style>
        .route-box {
            background: white;
            padding: 20px;
            border-radius: 20px;
            margin-top: 15px;
            text-align: left;
            width: 100%;
            box-sizing: border-box;
            border-left: 10px solid var(--green);
        }
        .route-title {
            font-weight: 800;
            color: var(--navy);
            font-size: 26px;
            margin-bottom: 5px;
        }
        .route-desc {
            font-size: 22px;
            color: #555;
            line-height: 1.2;
        }
        .bus-list {
            margin-top: 30px;
            font-size: 32px;
            font-weight: 800;
            color: var(--navy);
            background: var(--cream);
            padding: 20px;
            border-radius: 50px;
            border: 2px dashed var(--green);
        }
    </style>
</head>
<body>
    <div class="post-container story">
        <img src="../logo.png" class="brand-logo-story" alt="Logo">
        
        <div class="subtitle" style="margin-top: 150px;">Highlight: Transporte</div>
        <h1>Llegar es fácil</h1>
        
        <div class="route-box">
            <div class="route-title">Desde Liniers</div>
            <div class="route-desc">🚌 108 + 181 o 🚌 21 + 53</div>
        </div>
        <div class="route-box">
            <div class="route-title">Desde Ramos Mejía</div>
            <div class="route-desc">🚌 181 (Directo al Estadio)</div>
        </div>
        <div class="route-box">
            <div class="route-title">Desde Microcentro / Palermo</div>
            <div class="route-desc">🚆 Tren San Martín (Est. Caseros)</div>
        </div>
        <div class="route-box">
            <div class="route-title">Desde Villa Devoto</div>
            <div class="route-desc">🚌 105 o Tren San Martín</div>
        </div>

        <div class="bus-list">
            🚌 53, 105, 123, 181, 237, 343
        </div>

        <div class="tap-indicator">Pedir Indicaciones</div>
    </div>
</body>
</html>
