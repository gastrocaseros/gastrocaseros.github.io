<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <title>IMO - Methanobrevibacter smithii - Slide 1</title>
    <style>
        .character-wrap {
            position: absolute;
            right: 30px;
            bottom: 90px;
            width: 460px;
            opacity: 0.95;
        }
        .character-wrap img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.12));
        }
        .hook-tag {
            display: inline-block;
            background: var(--green);
            color: white;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            padding: 10px 28px;
            border-radius: 30px;
            margin-bottom: 28px;
        }
        .question-text {
            font-family: 'Playfair Display', serif;
            font-size: 68px;
            color: var(--navy);
            line-height: 1.1;
            font-weight: 800;
            margin-bottom: 0;
            max-width: 580px;
        }
        .question-text span {
            color: var(--green);
        }
        .sub-hook {
            font-size: 30px;
            color: var(--navy);
            opacity: 0.75;
            margin-top: 24px;
            line-height: 1.4;
            max-width: 540px;
        }
    </style>
</head>
<body>
    <div class="post-container compact">
        <div class="sidebar">
            <img src="logo.png" class="brand-logo" alt="Logo">
            <div class="sidebar-name">GastroCaseros</div>
        </div>
        <div class="top-accent"></div>

        <div style="margin-top: 60px;">
            <div class="hook-tag">Microbiota Intestinal</div>
            <h1 class="question-text">¿Constipación que no mejora, o te sentís <span>hinchado/a</span> después de comer?</h1>
            <p class="sub-hook">La respuesta puede estar en tu microbiota intestinal. 🌀</p>
        </div>

        <div class="character-wrap">
            <img src="intestino_dolor.png" alt="Personaje intestino con dolor de panza">
        </div>

        <div class="footer-info">
            <span>Deslizá para conocer la causa 👉</span>
        </div>
        <div class="bottom-accent"></div>
    </div>
</body>
</html>
