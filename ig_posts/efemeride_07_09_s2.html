<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <title>Efeméride 9 de Julio - Slide 2</title>
    <style>
        .slide-body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex-grow: 1;
            text-align: center;
            padding: 0 20px;
        }
        .quote-eyebrow {
            font-size: 26px;
            color: var(--green);
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 50px;
        }
        .quote-main {
            font-family: 'Playfair Display', serif;
            font-size: 82px;
            font-style: italic;
            color: var(--navy);
            line-height: 1.2;
            margin-bottom: 40px;
        }
        .quote-main span {
            color: #74ACDF;
        }
        .quote-divider {
            width: 80px;
            height: 4px;
            background: #74ACDF;
            border-radius: 2px;
            margin: 0 auto 30px;
        }
        .quote-attr {
            font-size: 30px;
            color: var(--green);
            font-weight: 600;
        }
        .quote-dates {
            font-size: 24px;
            color: var(--navy);
            opacity: 0.5;
            margin-top: 8px;
        }
        .closing {
            margin-top: 60px;
            font-size: 28px;
            color: var(--navy);
            opacity: 0.75;
        }
    </style>
</head>
<body>
    <div class="post-container compact">
        <div class="escarapela-mini"></div>
        <div class="sidebar">
            <img src="logo.png" class="brand-logo" alt="Logo">
            <div class="sidebar-name">GastroCaseros</div>
        </div>
        <div class="top-accent"></div>

        <div class="slide-body">

            <p class="quote-eyebrow">9 de Julio · 1816</p>

            <p class="quote-main">
                "Si somos <span>libres</span>,<br>
                todo nos sobra"
            </p>

            <div class="quote-divider"></div>

            <p class="quote-attr">Gral. José de San Martín</p>
            <p class="quote-dates">Libertador de América · 1778–1850</p>

            <p class="closing">
                Desde GastroCaseros, un saludo a todos<br>los argentinos en este día patrio. 🇦🇷
            </p>

        </div>

        <div class="footer-info">
            <span>Consultorio GastroCaseros · Caseros · Tres de Febrero</span>
        </div>
    </div>
</body>
</html>
