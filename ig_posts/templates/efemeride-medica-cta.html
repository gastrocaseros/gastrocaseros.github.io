<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <title>{{TITLE}}</title>
</head>
<body>
    <div class="post-container compact layout-ef-medica layout-ef-cta">
        <div class="sidebar">
            <img src="logo.png" class="brand-logo" alt="Logo de GastroCaseros">
            <div class="sidebar-name">GastroCaseros</div>
        </div>
        <div class="top-accent"></div>

        <div class="subtitle">{{SUBTITLE}}</div>
        <h1>{{HEADLINE}}</h1>

        <p style="font-size: 34px; margin-bottom: 10px;">{{BODY}}</p>

        <div class="highlight-box cta-soft">
            {{CTA_SOFT}}
        </div>

        <div class="info-card contact-card">
            <div class="info-title">¿Dudas? Escribinos por WhatsApp</div>
            <p class="wa-number">📲 11 2457-3240</p>
        </div>

        <div class="footer-info">
            <a href="https://maps.app.goo.gl/Jm5oWaNRarQq51d8A">📍 Justo José de Urquiza 4530, Caseros</a>
            <span>🌐 gastrocaseros.com.ar</span>
        </div>
        <div class="bottom-accent"></div>
    </div>
</body>
</html>
