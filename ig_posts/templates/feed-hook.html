<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <title>{{TITLE}}</title>
</head>
<body>
    <div class="post-container layout-hook">
        <div class="sidebar">
            <img src="logo.png" class="brand-logo" alt="Logo de GastroCaseros">
            <div class="sidebar-name">GastroCaseros</div>
        </div>
        <div class="top-accent"></div>
        <main class="content-zone">
            <div class="subtitle">{{SUBTITLE}}</div>
            <h1>{{HEADLINE}}</h1>
            <p>{{BODY}}</p>
        </main>
        <div class="footer-info">
            <span>{{FOOTER}}</span>
        </div>
        <div class="bottom-accent"></div>
    </div>
</body>
</html>
