<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <title>{{TITLE}}</title>
</head>
<body>
    <div class="post-container compact layout-ef-patriotica">
        <div class="escarapela-mini"></div>
        <div class="sidebar">
            <img src="logo.png" class="brand-logo" alt="Logo de GastroCaseros">
            <div class="sidebar-name">GastroCaseros</div>
        </div>
        <div class="top-accent"></div>
        <main class="content-zone">
            <div class="subtitle">{{SUBTITLE}}</div>
            <h1>{{HEADLINE}}</h1>
            <div class="highlight-box">{{BODY}}</div>
            <!-- SUGERENCIA DE IMAGEN: agregar solo si aporta valor histórico o institucional. -->
        </main>
        <div class="footer-info">
            <span>Slide {{SLIDE_NUMBER}}/{{SLIDE_TOTAL}} · Deslizá 👉</span>
        </div>
        <div class="bottom-accent"></div>
    </div>
</body>
</html>
