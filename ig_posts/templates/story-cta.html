<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="stories.css">
    <title>{{TITLE}}</title>
</head>
<body>
    <div class="post-container story compact layout-story-cta">
        <img src="logo.png" class="brand-logo-story" alt="Logo de GastroCaseros">
        <div class="subtitle">{{SUBTITLE}}</div>
        <h1>{{HEADLINE}}</h1>
        <div class="badge-pill">{{BADGE}}</div>
        <div class="cta-panel">
            <div class="cta-panel__eyebrow">{{CTA_EYEBROW}}</div>
            <div class="cta-panel__title">{{CTA_TITLE}}</div>
            <div class="cta-panel__label">📲 Escribinos por WhatsApp</div>
            <div class="cta-panel__value">11 2457-3240</div>
        </div>
        <div class="tap-indicator">Colocar sticker de enlace</div>
        <div class="footer-info">
            <span>🌐 gastrocaseros.com.ar</span>
        </div>
    </div>
</body>
</html>
