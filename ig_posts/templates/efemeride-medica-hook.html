<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <title>{{TITLE}}</title>
</head>
<body>
    <div class="post-container compact layout-ef-medica">
        <div class="sidebar">
            <img src="logo.png" class="brand-logo" alt="Logo de GastroCaseros">
            <div class="sidebar-name">GastroCaseros</div>
        </div>
        <div class="top-accent"></div>

        <div class="subtitle">{{SUBTITLE}}</div>
        <h1>{{HEADLINE}}</h1>
        <h2 style="font-size: 38px; color: var(--navy); font-weight: 400; margin-top: 0; margin-bottom: 30px;">{{LEAD}}</h2>

        <div class="highlight-box" style="margin-top: 10px; font-size: 34px;">
            {{BODY}}
        </div>

        <div class="footer-info">
            <span>Deslizá para saber más 👉</span>
        </div>
        <div class="bottom-accent"></div>
    </div>
</body>
</html>
