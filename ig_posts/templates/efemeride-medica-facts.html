<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <title>{{TITLE}}</title>
</head>
<body>
    <div class="post-container compact layout-ef-medica">
        <div class="sidebar">
            <img src="logo.png" class="brand-logo" alt="Logo de GastroCaseros">
            <div class="sidebar-name">GastroCaseros</div>
        </div>
        <div class="top-accent"></div>

        <div class="subtitle">{{SUBTITLE}}</div>
        <h1>{{HEADLINE}}</h1>

        <div class="fact-stack">
            <div class="fact-card">{{FACT_1}}</div>
            <div class="fact-card">{{FACT_2}}</div>
            <div class="fact-card">{{FACT_3}}</div>
        </div>

        <div class="footer-info">
            <span>Deslizá para el cierre 👉</span>
        </div>
        <div class="bottom-accent"></div>
    </div>
</body>
</html>
