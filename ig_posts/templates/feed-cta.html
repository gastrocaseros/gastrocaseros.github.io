<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <title>{{TITLE}}</title>
</head>
<body>
    <div class="post-container layout-cta-turno">
        <div class="sidebar">
            <img src="logo.png" class="brand-logo" alt="Logo de GastroCaseros">
            <div class="sidebar-name">GastroCaseros</div>
        </div>
        <div class="top-accent"></div>
        <div class="badge-pill">{{BADGE}}</div>
        <h1>{{HEADLINE}}</h1>
        <p class="lead">{{BODY}}</p>
        <div class="cta-panel">
            <div class="cta-panel__eyebrow">{{CTA_EYEBROW}}</div>
            <div class="cta-panel__title">{{CTA_TITLE}}</div>
            <div class="cta-panel__divider"></div>
            <div class="cta-panel__label">📲 Reservá por WhatsApp</div>
            <div class="cta-panel__value">11 2457-3240</div>
        </div>
        <div class="footer-info">
            <a href="https://maps.app.goo.gl/Jm5oWaNRarQq51d8A">📍 Justo José de Urquiza 4530, Caseros</a>
            <span>🌐 gastrocaseros.com.ar</span>
        </div>
        <div class="bottom-accent"></div>
    </div>
</body>
</html>
